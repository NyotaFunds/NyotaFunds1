<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYOTA FUND KENYA</title>
  <style>
    /* Prevent horizontal scroll and ensure responsiveness */
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden; /* Prevent horizontal scrolling */
      font-family: Arial, sans-serif; /* Optional: for better font rendering */
    }

    /* Style for the error message window */
    #errorMessage {
      display: none; /* Hidden by default */
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 250px;
      padding: 10px;
      background-color: red;
      color: white;
      font-weight: bold;
      text-align: center;
      border-radius: 5px;
      z-index: 1000;
    }

    /* Make images responsive */
    .header-image img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* Optional: Style for container and text for better appearance on small screens */
    .container {
      padding: 20px;
      box-sizing: border-box;
    }

    .welcome-text {
      font-size: 16px;
      line-height: 1.5;
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin-right: 10px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <!-- Error message div -->
  <div id="errorMessage"></div>

  <div class="header-image">
    <img src="images.jpeg" alt="NYOTA FUND KENYA" />
  </div>
  <div class="container">
    <p class="welcome-text">
      Hi👋,Welcome to NYOTA FUND KENYA. We are going to take you through some few questions before you receive your funds. <strong>Are you ready for that?</strong>
    </p>
    <div class="buttons">
      <button onclick="nextPage()">Yes</button>
      <button onclick="notReady()">No</button>
    </div>
  </div>

  <script>
    function nextPage() {
      window.location.href = 'index2.html';
    }

    function notReady() {
      showError("Please come back when you are ready.");
    }

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';

      // Hide after 2 seconds
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 2000);
    }
  </script>
</body>
</html>
